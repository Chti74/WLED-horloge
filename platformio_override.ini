[platformio]
default_envs = d1mini_horloge, esp32dev_horloge

[env:d1mini_horloge]
extends = env:d1_mini
custom_usermods = seven_segment_display_reloaded
build_flags = ${env:d1_mini.build_flags}
  -D USERMOD_SSDR
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_WEBSOCKETS
  -D WLED_DISABLE_OTA

[env:esp32dev_horloge]
extends = env:esp32dev
custom_usermods = seven_segment_display_reloaded
build_flags = ${env:esp32dev.build_flags}
  -D USERMOD_SSDR
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_WEBSOCKETS
  -D WLED_DISABLE_OTA
