[platformio]
default_envs = esp32dev_horloge

[env:esp32dev_horloge]
board = esp32dev
platform = ${esp32.platform}
lib_deps = ${esp32.lib_deps}
build_unflags = ${common.build_unflags} -fno-rtti
board_build.partitions = tools/WLED_ESP32_4MB_256KB_FS.csv
build_flags = ${common.build_flags_esp32}
  -D WLED_RELEASE_NAME=HORLOGE
  -D WLED_DISABLE_INFRARED
custom_usermods = seven_segment_display_reloaded
